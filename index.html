<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Gradient background for the page */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Profile Card Styling */
        .profile-card {
            background-color: #ffffff;
            width: 320px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 4px solid #764ba2;
        }

        .name {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 0.2rem;
        }

        .stream {
            font-size: 0.9rem;
            color: #764ba2;
            font-weight: 600;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bio {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div class="profile-card">
        <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" alt="Student Profile" class="profile-img">
        
        <h2 class="name">Alex Rivers</h2>
        <p class="stream">Computer Science</p>
        <p class="bio">Passionate about full-stack development and artificial intelligence. Always looking for new challenges and coffee-fueled coding sessions.</p>
    </div>

</body>
</html>
